<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->

<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- ===== 中英文双语切换 / Bilingual (ZH-EN) switch ===== -->
<style>
  /* 根据 <html data-lang> 显示对应语言、隐藏另一种语言 */
  html[data-lang="zh"] .lang-en { display: none !important; }
  html[data-lang="en"] .lang-zh { display: none !important; }

  /* 顶部导航里的「语言切换」胶囊按钮 */
  #lang-toggle a { cursor: pointer; }
  #lang-toggle .lang-pill {
    display: inline-block;
    font-size: 0.7em;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: 1.5px solid currentColor;
    border-radius: 999px;
    padding: 0.1em 0.62em;
    line-height: 1.5;
    opacity: 0.8;
    transition: opacity .15s ease, background-color .15s ease, color .15s ease;
  }
  #lang-toggle a:hover .lang-pill { opacity: 1; }

  /* 让中文字体更清晰一些 */
  html[data-lang="zh"] body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, "Hiragino Sans GB", sans-serif; }

  /* ===== 移动端适配优化 ===== */
  /* 长链接、长单词（如 arXiv 编号、URL）自动换行，避免窄屏横向溢出 */
  .page__content, .archive__item-excerpt { overflow-wrap: break-word; word-wrap: break-word; }
  /* 正文图片：限制最大宽度、自动高度，避免在手机上溢出或过大 */
  .page__content img { max-width: 100%; height: auto; }
  /* 宽表格在小屏上可横向滚动，而不是撑破布局 */
  .page__content table { display: block; max-width: 100%; overflow-x: auto; }
</style>
<script>
  /* 进入页面时尽早设置语言，避免内容闪烁；默认中文(zh) */
  (function () {
    try {
      var saved = localStorage.getItem('site_lang');
      var lang = (saved === 'en' || saved === 'zh') ? saved : 'zh';
      document.documentElement.setAttribute('data-lang', lang);
      document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'en';
    } catch (e) {
      document.documentElement.setAttribute('data-lang', 'zh');
    }
  })();

  function setSiteLang(lang) {
    document.documentElement.setAttribute('data-lang', lang);
    document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'en';
    try { localStorage.setItem('site_lang', lang); } catch (e) {}
    var pill = document.getElementById('lang-pill');
    if (pill) pill.textContent = (lang === 'zh') ? 'EN' : '中';
  }

  document.addEventListener('DOMContentLoaded', function () {
    var cur = document.documentElement.getAttribute('data-lang') || 'zh';
    var pill = document.getElementById('lang-pill');
    if (pill) pill.textContent = (cur === 'zh') ? 'EN' : '中';
    var btn = document.getElementById('lang-toggle');
    if (btn) btn.addEventListener('click', function (e) {
      e.preventDefault();
      var now = document.documentElement.getAttribute('data-lang') || 'zh';
      setSiteLang(now === 'zh' ? 'en' : 'zh');
    });
  });
</script>
<!-- ===== end bilingual switch ===== -->

<!-- end custom head snippets -->
